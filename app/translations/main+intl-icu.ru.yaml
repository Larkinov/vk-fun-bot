command:
    start: |-
        {started, select,
        first {
        Привет! {botName} включен!
        Теперь я в деле, и вот что я умею, чтобы вам не было скучно:

        🔮 /looser — узнай, кто сегодняшний неудачник
        📝 /help — посмотреть полный список команд

        Чтобы начать, просто напиши команду
        }
        repeat {
        {botName} уже включен!

        📝 /help — посмотреть список команд
        }
        other {
        {botName} уже включен!

        📝 /help — посмотреть список команд
        }
        }

    help: |
        Список команд:

        🔮 /looser — узнай, кто сегодняшний неудачник
        📝 /help — посмотреть список команд
    kick: >-
        {gender, select,
            male {
                {name} {lastname} уехал в Таксимо...
            }
            female {
                {name} {lastname} уехала в Таксимо...
            }
            other {
                {name} {lastname} уехал в Таксимо...
            }
        }
    newuser: |
        {name} {lastname}, ваша Палата №6, добро пожаловать!
    statistic:
        looser_all: "Статистика неудачников за все время:"
        looser_month: |
            ***
            Статистика неудачников за месяц:
        looser_week: |
            ***
            Статистика неудачников за неделю:
service:
    denied:
        delay_time: >-
            {hour, plural,
                one {⌛ Время ожидания данной команды еще не истекло. Остался # час}
                few {⌛ Время ожидания данной команды еще не истекло. Осталось # часа}
                many {⌛ Время ожидания данной команды еще не истекло. Осталось # часов}
                other {⌛ Время ожидания данной команды еще не истекло. Осталось # часа}
            }
